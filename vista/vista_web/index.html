<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Truc — Online</title>
  <style>
    /* Paleta vista_desktop */
    :root {
      --bg: #1a1d23;
      --bg-table: #1a3d1c;
      --bg-panel: #2d3139;
      --bg-btn: #5c4d7a;
      --bg-btn-card: #4a3d5c;
      --fg: #e0e0e0;
      --fg-dim: #8ab88a;
      --fg-accent: #b0a0c0;
      --center-box: #0d2a0e;
      --center-title: #7ab87a;
      --senyes-box: #1a2d1a;
      --carta: #2d5a30;
      --ma-highlight: #e06060;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .header {
      padding: 8px 16px;
      background: var(--bg);
      flex-shrink: 0;
    }
    .header h1 { margin: 0; font-size: 1.25rem; color: var(--fg-accent); }
    .status { font-size: 0.95rem; margin-top: 4px; }
    .status.normal { color: var(--fg-dim); }
    .status.waiting { color: #888; }
    .status.error { color: var(--ma-highlight); }

    .game-wrap {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .taula-container {
      flex: 1;
      overflow: auto;
      background: var(--bg-table);
      padding: 12px;
    }
    .log-panel {
      width: 220px;
      flex-shrink: 0;
      background: var(--bg-panel);
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .log-panel h3 {
      margin: 0 0 8px 0;
      font-size: 1rem;
      color: var(--fg);
    }
    .log-content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      background: #252a32;
      color: #d0e0d0;
      font-size: 0.9rem;
      padding: 6px;
      border-radius: 4px;
    }
    .log-content.empty { color: var(--fg-dim); }

    .info-row {
      color: var(--fg-dim);
      font-size: 0.95rem;
      margin-bottom: 6px;
    }
    .info-row .ma-jugador { color: var(--ma-highlight); font-weight: bold; }
    .rivals {
      margin-bottom: 6px;
    }
    .rivals .rival-label { color: var(--fg-dim); font-size: 0.9rem; }
    .rivals .dorsos { display: flex; gap: 4px; margin-top: 2px; }
    .dorso {
      width: 48px;
      height: 68px;
      background: var(--carta);
      color: var(--fg-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      border-radius: 4px;
    }
    .center-box {
      background: var(--center-box);
      border: 2px ridge var(--center-title);
      border-radius: 4px;
      padding: 8px;
      margin: 6px 0;
    }
    .center-box .title {
      color: var(--center-title);
      font-weight: bold;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .cartes-per-jugador {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .cartes-col {
      flex: 1;
      min-width: 80px;
    }
    .cartes-col .col-label {
      color: #9aca9a;
      font-size: 0.85rem;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .cartes-col .carta-pila {
      background: var(--carta);
      color: var(--fg);
      padding: 6px 10px;
      margin: 2px 0;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    .senyes-box {
      background: var(--senyes-box);
      border: 2px ridge var(--center-title);
      border-radius: 4px;
      padding: 8px;
      margin: 6px 0;
    }
    .senyes-box .title { color: var(--center-title); font-weight: bold; font-size: 0.9rem; margin-bottom: 4px; }
    .senyes-box .line { font-size: 0.9rem; }
    .puntuacio {
      font-size: 1.25rem;
      font-weight: bold;
      margin: 8px 0;
      color: var(--fg);
    }
    .jugador-actual {
      color: var(--fg-dim);
      font-size: 0.95rem;
      margin: 6px 0 4px 0;
    }
    .ma-cartes {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .ma-cartes .carta-btn {
      background: var(--carta);
      color: var(--fg);
      border: none;
      padding: 10px 14px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .ma-cartes .carta-btn:hover { filter: brightness(1.15); }
    .ma-cartes .carta-btn:disabled { opacity: 0.6; cursor: default; }

    .bottom-bar {
      flex-shrink: 0;
      height: 64px;
      background: var(--bg-panel);
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .bottom-bar .accions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .bottom-bar .accions button {
      background: var(--bg-btn);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
    }
    .bottom-bar .accions button.jugar-carta { background: var(--bg-btn-card); }
    .bottom-bar .accions button:hover { filter: brightness(1.1); }
    .bottom-bar .hint { color: #888; font-size: 0.85rem; margin-top: 4px; }
    .bottom-bar .esperant { color: #888; font-size: 0.95rem; }

    .fi-partida {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .fi-partida.visible { display: flex; }
    .fi-partida .box {
      background: var(--bg-panel);
      padding: 30px;
      border-radius: 8px;
      text-align: center;
      max-width: 90%;
    }
    .fi-partida h2 { margin: 0 0 12px 0; color: var(--fg-accent); font-size: 1.4rem; }
    .fi-partida .score { font-size: 1.2rem; margin-bottom: 8px; }
    .fi-partida .payoffs { color: #888; font-size: 0.9rem; margin-bottom: 16px; }
    .fi-partida button {
      background: var(--bg-btn);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    .fi-partida button:hover { filter: brightness(1.1); }

    #taula { display: flex; flex: 1; flex-direction: column; min-height: 0; overflow: hidden; }
    #taula.hidden { display: none !important; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Truc — Online</h1>
    <p id="status" class="status waiting">Connectant...</p>
  </div>

  <div id="taula" class="hidden">
    <div class="game-wrap">
      <div class="taula-container">
        <div class="info-row" id="infoRow">Ronda: 1  ·  Mà: <span class="ma-jugador">Jugador 0</span></div>
        <div class="rivals" id="rivals">
          <div class="rival-label" id="rivalLabel">Rival (J1)</div>
          <div class="dorsos" id="dorsos"></div>
        </div>
        <div class="center-box">
          <div class="title">Cartes jugades</div>
          <div class="cartes-per-jugador" id="cartesJugadesCols"></div>
        </div>
        <div class="senyes-box hidden" id="senyesBox">
          <div class="title">Senyes d'aquesta mà</div>
          <div id="senyesContent"></div>
        </div>
        <div class="puntuacio" id="puntuacio">E0: 0    E1: 0</div>
        <div class="jugador-actual" id="jugadorActual">Jugador actual (J0)</div>
        <div class="ma-cartes" id="maCartes"></div>
      </div>
      <div class="log-panel">
        <h3>Registre d'accions</h3>
        <div class="log-content empty" id="logContent">— Cap acció encara —</div>
      </div>
    </div>
    <div class="bottom-bar">
      <div class="accions" id="accions"></div>
      <div class="hint hidden" id="hintCartes">Clica una carta o prem 1, 2, 3</div>
      <div class="esperant hidden" id="esperantRival">Esperant torn del rival...</div>
    </div>
  </div>

  <div id="fiPartida" class="fi-partida">
    <div class="box">
      <h2>Joc acabat!</h2>
      <p class="score" id="fiScore">E0: 0  —  E1: 0</p>
      <p class="payoffs" id="fiPayoffs"></p>
      <button type="button" id="btnTornarJugar">Tornar a jugar</button>
    </div>
  </div>

  <script>
    var ACCIONS_CAT = [
      "Jugar carta 1", "Jugar carta 2", "Jugar carta 3",
      "Apostar envit", "Truc",
      "Vull envit", "Vull truc", "Fora envit", "Fora truc",
      "Passar",
      "Senya 11 bastos", "Senya 10 ors", "Senya as espases",
      "Senya as bastos", "Senya manilla espases", "Senya manilla ors",
      "Senya tres", "Senya as bord", "Senya cegas"
    ];
    var ACCIO_TECLA = { 0: "1", 1: "2", 2: "3", 3: "e", 4: "t", 5: "v", 6: "v", 7: "f", 8: "f", 9: "p" };

    var protocol = location.protocol === "https:" ? "wss:" : "ws:";
    var wsUrl = protocol + "//" + location.host + "/ws";
    var ws = null;
    var esperantAccio = false;
    var keyToAction = {};

    function setStatus(msg, className) {
      var el = document.getElementById("status");
      el.textContent = msg;
      el.className = "status " + (className || "normal");
    }

    function cardsCount(hist, pid) {
      var n = 0;
      for (var i = 0; i < (hist || []).length; i++) if (hist[i][0] === pid) n++;
      return Math.max(0, 3 - n);
    }

    function actionNameFromId(actionId) {
      return ACCIONS_CAT[actionId] != null ? ACCIONS_CAT[actionId] : "Acció " + actionId;
    }

    function renderTaula(state, accionsLegals) {
      var t = document.getElementById("taula");
      var fi = document.getElementById("fiPartida");
      t.classList.remove("hidden");
      fi.classList.remove("visible");

      var idJugador = state.id_jugador ?? 0;
      var numJugadors = state.num_jugadors ?? 2;
      var puntuacio = state.puntuacio || [0, 0];
      var ronda = (state.comptador_ronda || 0) + 1;
      var ma = state.ma ?? 0;
      var hist = state.hist_cartes || [];
      var histSenyes = state.hist_senyes || [];
      var estatTruc = state.estat_truc || {};
      var estatEnvit = state.estat_envit || {};
      var maJugador = state.ma_jugador || [];
      var faseTorn = state.fase_torn ?? 2;
      var esFaseCartes = faseTorn === 2;

      document.getElementById("puntuacio").textContent = "E0: " + puntuacio[0] + "    E1: " + puntuacio[1];
      var infoHtml = "Ronda: " + ronda + "  ·  Mà: <span class=\"ma-jugador\">Jugador " + ma + "</span>";
      var trucLvl = estatTruc.level || 1;
      var envitLvl = estatEnvit.level || 0;
      if (trucLvl > 1) infoHtml += "  ·  Truc: " + trucLvl;
      if (envitLvl > 0) infoHtml += "  ·  Envit: " + envitLvl;
      document.getElementById("infoRow").innerHTML = infoHtml;

      document.getElementById("rivalLabel").textContent = "Rival (J" + (1 - idJugador) + ")";
      var dorsosEl = document.getElementById("dorsos");
      dorsosEl.innerHTML = "";
      var nDorsos = cardsCount(hist, 1 - idJugador);
      for (var d = 0; d < nDorsos; d++) {
        var span = document.createElement("span");
        span.className = "dorso";
        span.textContent = "?";
        dorsosEl.appendChild(span);
      }

      var piles = {};
      for (var h = 0; h < hist.length; h++) {
        var pid = hist[h][0], card = hist[h][1];
        if (!piles[pid]) piles[pid] = [];
        piles[pid].push(card);
      }
      var orderPids = [idJugador];
      for (var p = 0; p < numJugadors; p++) if (p !== idJugador) orderPids.push(p);
      var colsEl = document.getElementById("cartesJugadesCols");
      colsEl.innerHTML = "";
      for (var c = 0; c < orderPids.length; c++) {
        var pid = orderPids[c];
        var col = document.createElement("div");
        col.className = "cartes-col";
        col.innerHTML = "<div class=\"col-label\">J" + pid + "</div>";
        var cards = piles[pid] || [];
        if (cards.length === 0) {
          var empty = document.createElement("div");
          empty.className = "carta-pila";
          empty.textContent = "—";
          col.appendChild(empty);
        } else {
          for (var j = 0; j < cards.length; j++) {
            var cardEl = document.createElement("div");
            cardEl.className = "carta-pila";
            cardEl.textContent = cards[j];
            col.appendChild(cardEl);
          }
        }
        colsEl.appendChild(col);
      }

      var senyesBox = document.getElementById("senyesBox");
      if (histSenyes.length > 0) {
        senyesBox.classList.remove("hidden");
        var senyesContent = document.getElementById("senyesContent");
        senyesContent.innerHTML = "";
        for (var s = 0; s < histSenyes.length; s++) {
          var line = document.createElement("div");
          line.className = "line";
          line.textContent = "Jugador " + histSenyes[s][0] + ": " + histSenyes[s][1];
          senyesContent.appendChild(line);
        }
      } else {
        senyesBox.classList.add("hidden");
      }

      document.getElementById("jugadorActual").textContent = "Jugador actual (J" + idJugador + ")";
      var maCartesEl = document.getElementById("maCartes");
      maCartesEl.innerHTML = "";
      keyToAction = {};
      for (var i = 0; i < maJugador.length; i++) {
        var cardClickable = esFaseCartes && accionsLegals.indexOf(i) !== -1;
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "carta-btn";
        btn.textContent = maJugador[i];
        btn.disabled = !cardClickable;
        if (cardClickable) {
          (function (idx) { btn.addEventListener("click", function () { enviarAccio(idx); }); })(i);
          keyToAction["" + (i + 1)] = i;
        }
        maCartesEl.appendChild(btn);
      }

      var actionLog = state.action_log || [];
      var logContent = document.getElementById("logContent");
      if (actionLog.length === 0) {
        logContent.textContent = "— Cap acció encara —";
        logContent.classList.add("empty");
      } else {
        logContent.classList.remove("empty");
        var logHtml = "";
        for (var a = 0; a < actionLog.length; a++) {
          var entry = actionLog[a];
          var nom = entry.nom_jugador != null ? entry.nom_jugador : "J" + entry.player_id;
          var actName = (entry.action !== undefined && entry.action !== null) ? actionNameFromId(entry.action) : (entry.action_name || "—");
          logHtml += "Jugador " + entry.player_id + " (" + nom + "): " + actName + "<br>";
        }
        logContent.innerHTML = logHtml;
        logContent.scrollTop = logContent.scrollHeight;
      }

      var divAccions = document.getElementById("accions");
      divAccions.innerHTML = "";
      var legals = accionsLegals || [];
      var esElMeuTorn = legals.length > 0;
      document.getElementById("hintCartes").classList.toggle("hidden", !esFaseCartes || !esElMeuTorn);
      document.getElementById("esperantRival").classList.toggle("hidden", esElMeuTorn);

      if (esElMeuTorn) {
        setStatus("És el teu torn. Tria una acció.");
        esperantAccio = true;
        for (var k = 0; k < legals.length; k++) {
          var actionId = legals[k];
          var btn = document.createElement("button");
          btn.type = "button";
          var isPlay = actionId <= 2;
          if (isPlay && maJugador[actionId]) {
            btn.textContent = maJugador[actionId] + " (" + (ACCIONS_CAT[actionId] || "Carta " + (actionId + 1)) + ")";
            btn.classList.add("jugar-carta");
            keyToAction["" + (actionId + 1)] = actionId;
          } else {
            btn.textContent = actionNameFromId(actionId);
            var tecla = ACCIO_TECLA[actionId];
            if (tecla) keyToAction[tecla] = actionId;
          }
          (function (aid) { btn.addEventListener("click", function () { enviarAccio(aid); }); })(actionId);
          divAccions.appendChild(btn);
        }
      } else {
        setStatus("Esperant el rival...");
        esperantAccio = false;
      }
    }

    function enviarAccio(actionId) {
      if (!esperantAccio || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ action: actionId }));
      esperantAccio = false;
      setStatus("Enviant jugada...");
    }

    function onKeyDown(e) {
      var key = (e.key || "").toLowerCase();
      if (keyToAction[key] !== undefined) {
        enviarAccio(keyToAction[key]);
        e.preventDefault();
      }
    }

    function mostrarFiPartida(score, payoffs) {
      document.getElementById("taula").classList.add("hidden");
      var fi = document.getElementById("fiPartida");
      fi.classList.add("visible");
      document.getElementById("fiScore").textContent = "E0: " + score[0] + "  —  E1: " + score[1];
      document.getElementById("fiPayoffs").textContent = "Payoffs: " + JSON.stringify(payoffs || []);
      setStatus("Partida acabada.");
    }

    function connectar() {
      setStatus("Connectant...", "waiting");
      ws = new WebSocket(wsUrl);
      ws.onopen = function () {
        setStatus("Connectat. Iniciant partida...", "normal");
      };
      ws.onmessage = function (ev) {
        var data;
        try { data = JSON.parse(ev.data); } catch (err) {
          setStatus("Error: resposta invàlida", "error");
          return;
        }
        if (data.type === "state") {
          renderTaula(data.state, data.accions_legals);
        } else if (data.type === "game_over") {
          mostrarFiPartida(data.score || [0, 0], data.payoffs);
        } else if (data.type === "error") {
          setStatus("Error: " + (data.message || "desconegut"), "error");
        }
      };
      ws.onclose = function () { setStatus("Desconnectat.", "waiting"); };
      ws.onerror = function () { setStatus("Error de connexió.", "error"); };
    }

    document.getElementById("btnTornarJugar").addEventListener("click", function () {
      if (ws) ws.close();
      document.getElementById("fiPartida").classList.remove("visible");
      connectar();
    });
    document.addEventListener("keydown", onKeyDown);

    connectar();
  </script>
</body>
</html>
